<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>إعدادات مرافق كلود</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
      background: #0f1117; color: #e2e4e9;
      max-width: 520px; margin: 0 auto; padding: 32px 28px;
      line-height: 1.7;
    }
    h1 { font-size: 22px; margin-bottom: 6px; }
    .sub { color: #8b90a0; font-size: 13px; margin-bottom: 24px; }
    .sub a { color: #4f8ff7; }

    .card {
      background: #052e1a; border: 1px solid #0f5a34;
      border-radius: 12px; padding: 16px 18px; margin-bottom: 20px;
    }
    .card .title {
      color: #22c55e; font-weight: 700; display: flex; align-items: center; gap: 8px;
    }
    .card p { color: #c8cad0; font-size: 12.5px; margin-top: 8px; }
    #maxStatus { margin-top: 8px; font-size: 12px; }
    .btn {
      margin-top: 10px; padding: 7px 14px; border-radius: 6px;
      border: 1px solid #0f5a34; background: #042416; color: #22c55e;
      cursor: pointer; font-family: inherit; font-size: 12px;
    }
    .btn:hover { opacity: .85; }

    label {
      display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px;
    }
    textarea {
      width: 100%; padding: 10px 12px; border: 1px solid #2a2d3a;
      border-radius: 8px; font-size: 12.5px; font-family: inherit;
      background: #1e2130; color: #e2e4e9; direction: rtl;
      outline: none; resize: vertical; line-height: 1.7;
    }
    textarea:focus { border-color: #c2632f; }
    .hint {
      font-size: 11px; color: #8b90a0; margin-top: 4px; line-height: 1.5;
    }

    .actions {
      display: flex; gap: 10px; margin-top: 24px;
    }
    .primary {
      padding: 10px 20px; border-radius: 8px; border: none;
      background: #c2632f; color: #fff; font-size: 13px;
      font-family: inherit; cursor: pointer;
    }
    .primary:hover { background: #d97d4d; }
    .secondary {
      padding: 10px 20px; border-radius: 8px;
      background: transparent; color: #e2e4e9; border: 1px solid #2a2d3a;
      font-size: 13px; font-family: inherit; cursor: pointer;
    }
    .secondary:hover { background: #1a1d2a; }

    .toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: #22c55e; color: #fff; padding: 8px 20px; border-radius: 20px;
      font-size: 13px; display: none; animation: fadeUp .3s;
    }
    @keyframes fadeUp { from { opacity: 0; transform: translateX(-50%) translateY(8px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
  </style>
</head>
<body>
  <h1>⚙ الإعدادات</h1>

  <label for="memories">🧠 ذاكرة مخصّصة</label>
  <textarea id="memories" rows="8" placeholder="اسمي: أحمد
بريدي: ahmed@gmail.com
أفضّل النتائج من الأرخص"></textarea>
  <p class="hint">تُرسَل مع كل محادثة.</p>

  <label for="tasks" style="margin-top:20px;">⚡ مهام مكررة</label>
  <textarea id="tasks" rows="8" placeholder="صباح: افتح الإيميل ولخّص

أخبار: افتح سبق ولخّص الأهم

(افصل بين المهام بسطر فارغ)"></textarea>
  <p class="hint">أزرار ⚡ في الشريط الجانبي.</p>

  <div class="actions">
    <button class="primary" id="saveBtn">حفظ</button>
    <button class="secondary" id="exportBtn" title="تنزيل نسخة احتياطية">⬇ تصدير</button>
    <button class="secondary" id="importBtn" title="استعادة من ملف">⬆ استيراد</button>
    <button class="secondary" id="closeBtn">إغلاق</button>
  </div>
  <p class="hint" style="margin-top:12px;">
    💡 نسخة احتياطية تلقائية في <code style="font-size:11px;">~/.config/claude-companion/user-data.json</code> — تبقى بعد حذف الإضافة وتعود تلقائياً عند إعادة التثبيت.
  </p>

  <input type="file" id="importInput" accept="application/json" style="display:none;">
  <div class="toast" id="toast">تم الحفظ ✓</div>

  <script src="settings.js"></script>
</body>
</html>
