<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>إذن الميكروفون — مرافق كلود</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
      background: #0f1117; color: #e2e4e9;
      display: flex; align-items: center; justify-content: center;
      height: 100vh; margin: 0; padding: 24px;
    }
    .box {
      max-width: 440px; background: #1a1d2a; border: 1px solid #2a2d3a;
      border-radius: 16px; padding: 32px; text-align: center;
    }
    h1 { font-size: 22px; margin-bottom: 10px; }
    p { color: #8b90a0; line-height: 1.7; margin-bottom: 16px; font-size: 13px; }
    button {
      padding: 12px 24px; border-radius: 10px; border: none;
      background: #c2632f; color: #fff; font-size: 14px;
      font-family: inherit; cursor: pointer; font-weight: 600;
    }
    button:hover { opacity: .9; }
    button.close { background: #22c55e; margin-top: 14px; }
    .mic { font-size: 48px; margin-bottom: 16px; }
    .status { margin-top: 20px; padding: 14px; border-radius: 8px; font-size: 13px; text-align: right; line-height: 1.7; }
    .ok { background: #052e1a; color: #22c55e; border: 1px solid #0f5a34; text-align: center; }
    .err { background: #2a1515; color: #f87171; border: 1px solid #5a1f1f; }
    .status b { color: #fff; }
    .status a { color: #c2632f; text-decoration: underline; }
    .hide { display: none; }
  </style>
</head>
<body>
  <div class="box">
    <div class="mic">🎤</div>
    <h1>إذن الميكروفون</h1>
    <p>للإدخال الصوتي بالعربية نحتاج إذن الميكروفون مرة واحدة. اضغط الزر واختر <b>السماح</b>.</p>
    <button id="ask">منح الإذن</button>
    <div id="status" class="status hide"></div>
    <button id="close" class="close hide">إغلاق والعودة</button>
  </div>
  <script src="mic-permission.js"></script>
</body>
</html>
