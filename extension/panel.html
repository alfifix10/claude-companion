<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مرافق كلود</title>
  <link rel="stylesheet" href="panel.css">
</head>
<body data-theme="dark">
  <div class="app">
    <!-- Header with app title + settings -->
    <header class="hdr">
      <div class="hdr-brand">
        <img src="icons/icon48.png" alt="" class="hdr-icon">
        <span class="hdr-name">Claude Companion</span>
      </div>
      <div class="hdr-actions">
        <button id="historyBtn" class="ibtn" title="سجلّ المحادثات" aria-label="سجلّ المحادثات">
          <!-- "Messages list" — stacked chat bubbles: reads as "past conversations" more clearly than a clock. -->
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M8 10h8M8 14h5"/>
            <path d="M21 12a7 7 0 0 1-7 7H8l-4 3v-4.5A7 7 0 0 1 4 15V9a5 5 0 0 1 5-5h5a7 7 0 0 1 7 7z"/>
          </svg>
        </button>
        <button id="settingsBtn" class="ibtn" title="الإعدادات" aria-label="الإعدادات">
          <!-- Feather "sliders" — two horizontal sliders. Cleaner and less
               busy than a full gear at 18 px, reads as "settings/preferences". -->
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="4" y1="8" x2="20" y2="8"/>
            <line x1="4" y1="16" x2="20" y2="16"/>
            <circle cx="9" cy="8" r="2.4"/>
            <circle cx="15" cy="16" r="2.4"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Active tab indicator -->
    <div class="tab-strip" id="tabStrip">
      <span class="dot" id="tabDot"></span>
      <span class="tab-title" id="tabTitle">...</span>
    </div>

    <!-- Quick actions -->
    <div class="quick-row">
      <button class="chip" data-quick="screenshot">📸 لقطة</button>
      <button class="chip" data-quick="read_page">🎯 العناصر</button>
      <button class="chip" data-quick="get_text">📝 النص</button>
      <button class="chip warn" data-quick="clear_all">🧹 مسح</button>
    </div>

    <!-- User-defined repeated tasks -->
    <div class="tasks-row" id="tasksRow"></div>

    <!-- Proactive page briefing: appears when the user opens a readable page
         and is hidden otherwise. Runs Readability locally (zero Claude cost);
         Claude is only invoked if the user clicks an action chip. -->
    <div class="briefing" id="briefing" hidden>
      <div class="briefing-head">
        <span class="briefing-title" id="briefingTitle">—</span>
        <button class="briefing-close" id="briefingClose" title="إخفاء" aria-label="إخفاء">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
            <path d="M6 6l12 12M6 18L18 6"/>
          </svg>
        </button>
      </div>
      <p class="briefing-preview" id="briefingPreview"></p>
      <div class="briefing-actions">
        <button class="chip" data-brief="summarize">📝 لخّص</button>
        <button class="chip" data-brief="explain">🧠 اشرح</button>
        <button class="chip" data-brief="translate">🌐 ترجم</button>
        <button class="chip" data-brief="key_points">🎯 أهم النقاط</button>
      </div>
    </div>

    <!-- Messages -->
    <div class="messages-wrap">
      <div class="messages" id="messages">
        <div class="welcome" id="welcome">
          <div class="welcome-icon">🤖</div>
          <h2>مرحباً!</h2>
          <p>أنا مساعدك الذكي للتحكم بالمتصفح — يعمل باشتراك Claude Max بتكلفة $0 من الـ API.</p>
          <p class="hint-sm">اكتب أمراً مثل "لخّص هذه الصفحة" أو "افتح يوتيوب"</p>
        </div>
      </div>
      <!-- Floating scroll-to-bottom: hidden unless the user has scrolled up;
           pulses briefly when a new assistant message arrives while hidden. -->
      <button id="scrollBtn" class="scroll-btn" aria-label="الذهاب إلى الأسفل" title="الذهاب إلى الأسفل">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 5v14M5 12l7 7 7-7"/>
        </svg>
      </button>
    </div>

    <!-- Typing indicator (no stop button — send button doubles as stop) -->
    <div class="typing" id="typing" style="display:none;">
      <span></span><span></span><span></span>
      <span class="typing-text" id="typingText">يفكّر...</span>
    </div>

    <!-- Pasted-image previews (shown only when user has pasted images) -->
    <div class="attachments" id="attachments"></div>

    <!-- Input -->
    <div class="input-row">
      <textarea id="input" placeholder="اكتب أو الصق صورة... (Shift+Enter لسطر جديد)" rows="1"></textarea>
      <button id="micBtn" class="mic-btn" title="إدخال صوتي">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 1 0 6 0V5a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v3"/>
        </svg>
      </button>
      <!-- Dual-purpose button: airplane icon when idle (send), red square when working (hard-stop) -->
      <button id="sendBtn" class="send-btn" disabled>
        <svg class="ic-send" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
        </svg>
        <svg class="ic-stop" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="display:none">
          <rect x="6" y="6" width="12" height="12" rx="2"/>
        </svg>
      </button>
    </div>

    <!-- History overlay — slides in from the top when the 🕐 button is
         clicked. Holds the list of saved conversations; clicking one loads
         it into the main chat view. -->
    <div class="history-overlay" id="historyOverlay" hidden>
      <div class="history-head">
        <span class="history-title">سجلّ المحادثات</span>
        <button id="closeHistoryBtn" class="ibtn" title="إغلاق" aria-label="إغلاق">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
            <path d="M6 6l12 12M6 18L18 6"/>
          </svg>
        </button>
      </div>
      <button id="newConvBtn" class="new-conv-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round">
          <path d="M12 5v14M5 12h14"/>
        </svg>
        <span>محادثة جديدة</span>
      </button>
      <div class="history-list" id="historyList"></div>
    </div>
  </div>

  <script src="panel.js" type="module"></script>
</body>
</html>
